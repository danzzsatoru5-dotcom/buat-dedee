<html lang="id">

</head>

            <div id="secret-box" class="hidden">

                    "Kamu adalah hal terindah yang pernah hadir di hidupku. Terima kasih sudah selalu sabar dan ada buat aku. I love you to the moon and back! 🌙❤️"
                </p>

            <button id="main-btn">Buka Kejutan</button>
        </div>

    <script src="script.js"></script>

</html>
